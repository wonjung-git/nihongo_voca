<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일본어 단어장</title>
<style>
:root{--bg:#f5f7fa;--card:#ffffff;--ink:#1f2937;--sub:#6b7280;--line:#e5e7eb;--accent:#4f46e5;--accent2:#eef2ff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Hiragino Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;justify-content:center;padding:32px 24px;}
.wrap{width:100%;max-width:640px;}
header{text-align:center;margin-bottom:36px;}
header h1{font-size:26px;font-weight:800;margin-bottom:6px;}
header p{color:var(--sub);font-size:14px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.book-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;text-decoration:none;color:inherit;display:block;transition:.18s;}
.book-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(79,70,229,.12);transform:translateY(-2px);}
.book-icon{font-size:36px;margin-bottom:14px;}
.book-title{font-size:16px;font-weight:700;line-height:1.4;margin-bottom:6px;}
.book-sub{font-size:13px;color:var(--sub);line-height:1.5;}
.book-badge{display:inline-block;margin-top:12px;padding:4px 10px;background:var(--accent2);color:var(--accent);border-radius:6px;font-size:12px;font-weight:600;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>일본어 단어장</h1>
    <p>학습할 단어장을 선택하세요</p>
  </header>
  <div class="grid">
    <a href="dokidoki.html" class="book-card">
      <div class="book-icon">📖</div>
      <div class="book-title">NEW どきどき(도키도키)<br>일본어 초급 上</div>
      <div class="book-sub">8과 ~ 13과 · 랜덤 단어 연습</div>
      <span class="book-badge">초급</span>
    </a>
  </div>
</div>
</body>
</html>
