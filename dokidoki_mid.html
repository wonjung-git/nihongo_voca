<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEW どきどき 일본어 초급 上 (중간고사) - 단어장</title>
<style>
:root{--bg:#f5f7fa;--card:#ffffff;--ink:#1f2937;--sub:#6b7280;--line:#e5e7eb;--accent:#4f46e5;--accent2:#eef2ff;--ok:#10b981;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Hiragino Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;justify-content:center;padding:24px;}
.wrap{width:100%;max-width:560px;}
h1{font-size:22px;text-align:center;margin-bottom:4px;}
.sub{text-align:center;color:var(--sub);font-size:13px;margin-bottom:24px;}
.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.section{margin-bottom:22px;}
.label{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--ink);}
.chips{display:flex;flex-wrap:wrap;gap:10px;}
.chip{display:flex;align-items:center;gap:7px;padding:9px 14px;border:1px solid var(--line);border-radius:10px;cursor:pointer;font-size:14px;user-select:none;transition:.15s;background:#fff;}
.chip:hover{border-color:var(--accent);}
.chip.on{background:var(--accent2);border-color:var(--accent);color:var(--accent);font-weight:600;}
.chip input{accent-color:var(--accent);width:16px;height:16px;cursor:pointer;}
.start{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px;transition:.15s;}
.start:hover{background:#4338ca;}
.err{color:#dc2626;font-size:13px;text-align:center;margin-top:10px;min-height:16px;}
.quiz{display:none;}
.counter{text-align:center;color:var(--sub);font-size:13px;margin-bottom:12px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:36px 20px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:18px;min-height:230px;display:flex;flex-direction:column;justify-content:center;gap:16px;}
.field{display:none;}
.field.show{display:block;}
.field .ftag{font-size:11px;color:var(--sub);letter-spacing:1px;margin-bottom:4px;text-transform:uppercase;}
.kanji{font-size:46px;font-weight:700;}
.kana{font-size:34px;color:var(--accent);}
.kor{font-size:26px;}
.reveal-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
.rbtn{padding:10px 16px;border:1px solid var(--accent);background:#fff;color:var(--accent);border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;}
.rbtn:hover{background:var(--accent2);}
.rbtn.active{background:var(--accent);color:#fff;}
.nav{display:flex;gap:10px;}
.next{flex:1;padding:14px;background:var(--ok);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;}
.next:hover{background:#059669;}
.home{padding:14px 18px;background:#fff;color:var(--sub);border:1px solid var(--line);border-radius:12px;font-size:15px;cursor:pointer;}
.home:hover{border-color:var(--accent);color:var(--accent);}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--sub);font-size:13px;text-decoration:none;margin-bottom:16px;transition:.15s;}
.back-link:hover{color:var(--accent);}
</style>
</head>
<body>
<div class="wrap">
<a href="index.html" class="back-link">← 단어장 목록</a>
<h1>どきどき 일본어 초급 上 (중간고사)</h1>
<div class="sub">초급 3과 ~ 7과 · 랜덤 단어 연습</div>

<div class="panel" id="menu">
  <div class="section">
    <div class="label">1. 과 선택</div>
    <div class="chips" id="lessons">
      <label class="chip"><input type="checkbox" value="all" id="allBox">전체</label>
      <label class="chip"><input type="checkbox" value="3">3과</label>
      <label class="chip"><input type="checkbox" value="4">4과</label>
      <label class="chip"><input type="checkbox" value="5">5과</label>
      <label class="chip"><input type="checkbox" value="6">6과</label>
      <label class="chip"><input type="checkbox" value="7">7과</label>
    </div>
  </div>
  <div class="section">
    <div class="label">2. 처음 보여줄 항목 (하나만 선택)</div>
    <div class="chips" id="modes">
      <label class="chip on"><input type="radio" name="mode" value="kanji" checked>한자 <span style="color:var(--sub);font-size:11px">(없으면 가나)</span></label>
      <label class="chip"><input type="radio" name="mode" value="kana">가나</label>
      <label class="chip"><input type="radio" name="mode" value="kor">한글</label>
    </div>
  </div>
  <button class="start" id="startBtn">시작하기</button>
  <div class="err" id="err"></div>
</div>

<div class="quiz" id="quiz">
  <div class="counter" id="counter"></div>
  <div class="card" id="card">
    <div class="field" data-f="kanji"><div class="ftag">한자</div><div class="kanji" id="v-kanji"></div></div>
    <div class="field" data-f="kana"><div class="ftag">가나</div><div class="kana" id="v-kana"></div></div>
    <div class="field" data-f="kor"><div class="ftag">한글</div><div class="kor" id="v-kor"></div></div>
  </div>
  <div class="reveal-btns" id="revealBtns">
    <button class="rbtn" data-f="kanji">한자 보기</button>
    <button class="rbtn" data-f="kana">가나 보기</button>
    <button class="rbtn" data-f="kor">한글 보기</button>
  </div>
  <div class="nav">
    <button class="home" id="homeBtn">메인으로</button>
    <button class="next" id="nextBtn">다음 단어 →</button>
  </div>
</div>
</div>

const $=s=>document.querySelector(s);

function syncChips(){
  document.querySelectorAll('.chip').forEach(c=>{
    const inp=c.querySelector('input');
    c.classList.toggle('on', inp.checked);
  });
}
document.querySelectorAll('.chip input').forEach(inp=>inp.addEventListener('change',syncChips));

const allBox=$('#allBox');
const lessonBoxes=[...document.querySelectorAll('#lessons input')].filter(i=>i.value!=='all');
allBox.addEventListener('change',()=>{
  lessonBoxes.forEach(b=>b.checked=allBox.checked);
  syncChips();
});
lessonBoxes.forEach(b=>b.addEventListener('change',()=>{
  allBox.checked=lessonBoxes.every(x=>x.checked);
  syncChips();

let queue=[], idx=0, startForm='kanji', shownForms=new Set();
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

$('#startBtn').addEventListener('click',()=>{
  const lessons=lessonBoxes.filter(b=>b.checked).map(b=>b.value);
  startForm=document.querySelector('input[name=mode]:checked').value;
  if(!lessons.length){$('#err').textContent='과를 하나 이상 선택하세요.';return;}
  $('#err').textContent='';
  let words=[];
  lessons.forEach(L=>DATA[L].forEach(w=>words.push(w)));
  queue=shuffle(words.slice()); idx=0;
  $('#menu').style.display='none';
  $('#quiz').style.display='block';
  render();
});

function resolveKanji(w){return (w.kanji && w.kanji!=='-')?w.kanji:w.kana;}
function fieldValue(w,f){return f==='kanji'?resolveKanji(w):f==='kana'?w.kana:w.kor;}

function showForm(f){
  const w=queue[idx];
  $('#v-'+f).textContent=fieldValue(w,f);
  document.querySelector('.field[data-f="'+f+'"]').classList.add('show');
  document.querySelector('.rbtn[data-f="'+f+'"]').classList.add('active');
  shownForms.add(f);
}
function hideForm(f){
  document.querySelector('.field[data-f="'+f+'"]').classList.remove('show');
  document.querySelector('.rbtn[data-f="'+f+'"]').classList.remove('active');
  shownForms.delete(f);
}
document.querySelectorAll('.rbtn').forEach(b=>{
  b.addEventListener('click',()=>{const f=b.dataset.f; shownForms.has(f)?hideForm(f):showForm(f);});
});

function render(){
  if(idx>=queue.length){queue=shuffle(queue);idx=0;}
  shownForms=new Set();
  document.querySelectorAll('.field').forEach(e=>e.classList.remove('show'));
  document.querySelectorAll('.rbtn').forEach(e=>e.classList.remove('active'));
  showForm(startForm);
  $('#counter').textContent=(idx+1)+' / '+queue.length;
}

$('#nextBtn').addEventListener('click',()=>{idx++;render();});
$('#homeBtn').addEventListener('click',()=>{$('#quiz').style.display='none';$('#menu').style.display='block';});
</script>
</body>
</html>
